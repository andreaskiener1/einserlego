<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>IT Devices AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <a-scene arjs="debugUIEnabled: false">
      <a-assets>
        <a-asset-item id="zweier" src="lego-2er.gltf"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity gltf-model="#zweier" scale="0.1 0.1 0.1" rotation="-90 -90 90"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
